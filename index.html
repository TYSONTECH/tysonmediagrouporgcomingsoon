<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Screen Video</title>
    <style>
        /* Reset and force full height/width */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Full screen video container */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Forces full height on mobile/desktop, cropping sides if needed */
        }

        /* Subtle Mute/Unmute Button */
        .mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3); /* Ultra subtle dark transparent background */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7); /* Soft white text/icon */
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px); /* Modern blur effect */
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mute-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video" autoplay loop playsinline>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <button id="mute-btn" class="mute-btn">
            <span id="mute-icon">🔊</span> <span id="mute-text">Mute</span>
        </button>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = document.getElementById('mute-icon');
        const muteText = document.getElementById('mute-text');

        // Toggle mute/unmute
        muteBtn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                muteIcon.textContent = '🔊';
                muteText.textContent = 'Mute';
            } else {
                video.muted = true;
                muteIcon.textContent = '🔇';
                muteText.textContent = 'Unmute';
            }
        });

        // Crucial Web Browser Workaround:
        // Most modern browsers block video autoplay IF the video has audio. 
        // We attempt to play it with sound. If the browser blocks it, we automatically
        // mute it so it at least plays, and the user can click "Unmute" manually.
        document.addEventListener('DOMContentLoaded', () => {
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay with sound blocked. Muting video to allow autoplay.");
                    video.muted = true;
                    muteIcon.textContent = '🔇';
                    muteText.textContent = 'Unmute';
                    video.play();
                });
            }
        });
    </script>

</body>
</html>
